<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Character Answers</title>
  <link rel="stylesheet" href="/css/login.css">
</head>
<body>
  <main class="login-shell">
    <section class="login-card">
      <div class="terminal-titlebar" aria-hidden="true">
        <span class="dot dot--red"></span>
        <span class="dot dot--yellow"></span>
        <span class="dot dot--green"></span>
      </div>

      <div class="login-body">
        <section class="login-copy">
          <a class="brand-link" href="/">Character Answers</a>
          <p class="eyebrow">Welcome Back</p>
          <h1>Login to your account.</h1>
          <p class="intro">Return to your rooms and continue the conversations you started.</p>
        </section>

        <section class="login-panel" aria-label="Login form">
          <form id="login_form" class="login-form" autocomplete="on">
            <div class="form-heading">
              <p class="panel-label">Account Access</p>
              <h2>Enter your details.</h2>
            </div>

            <label for="login_email">Email</label>
            <input id="login_email" name="email" type="email" placeholder="enter your email" autocomplete="email" required>

            <label for="login_password">Password</label>
            <input id="login_password" name="password" type="password" placeholder="enter your password" autocomplete="current-password" required>

            <button class="submit-button" type="submit">Login</button>
            <p class="form-message" id="login_message" role="status" aria-live="polite"></p>

            <p class="form-switch">
              New here?
              <a href="/register">Create an account</a>
            </p>
          </form>
        </section>
      </div>
    </section>
  </main>

  <script src="/js/login.js"></script>
</body>
</html>
