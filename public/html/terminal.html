<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CMD WebSocket Terminal</title>
  <link rel="stylesheet" href="/css/terminal.css">

</head>
<body>

  <div class="terminal">

  </div>

  <script src="/js/terminal.js"></script>

</body>
</html>
