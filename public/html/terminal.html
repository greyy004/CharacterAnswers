<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Character Answers Console</title>
  <link rel="stylesheet" href="/css/terminal.css" />
</head>
<body>
  <div class="terminal-shell">
    <header class="terminal-header">
      <div>
        <p class="terminal-label">Character Answers</p>
        <h1>Command console</h1>
        <p class="terminal-subtitle">Send commands and view live responses in a simple workspace.</p>
      </div>
      <div id="status" class="status status--pending">Connecting...</div>
    </header>

    <main class="terminal-main">
      <div id="output" class="output"></div>
      <form class="terminal-form" onsubmit="return false;">
        <span class="prompt">></span>
        <input id="input" type="text" placeholder="Type a command" autocomplete="off" />
        <button id="sendBtn" type="button">Send</button>
      </form>
    </main>
  </div>

  <script src="/js/terminal.js"></script>
</body>
</html>
